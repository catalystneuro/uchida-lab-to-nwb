# Per-subject metadata for the Phillips 2025 dataset.
# Source: Subject metadata.xlsx provided by Hannah Phillips (2026-05-06).
#
# NWB conventions:
#   species: Latin binomial
#   sex: "M", "F", "U", or "O"
#   date_of_birth: YYYY-MM-DD (PyYAML loads this as datetime.date; convert_session.py
#                               promotes it to datetime with America/New_York timezone)
#   strain: inbred/outbred stock name
#   genotype: allele description (e.g., "WT")
#
# Weight at experiment time: not recorded for any subject.
# Hemisphere (L/R) of each fiber implant: randomized per animal, unknown here.

M4:
